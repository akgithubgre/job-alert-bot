name: Job Alert Bot

on:
  schedule:
    # All times in IST (UTC+5:30)
    # 12:00 AM IST = 6:30 PM UTC (prev day)
    - cron: "30 18 * * *"
    # 1:00 AM IST = 7:30 PM UTC (prev day)
    - cron: "30 19 * * *"
    # 6:00 AM IST = 12:30 AM UTC
    - cron: "30 0 * * *"
    # 9:00 AM IST = 3:30 AM UTC
    - cron: "30 3 * * *"
    # 12:00 PM IST = 6:30 AM UTC
    - cron: "30 6 * * *"
    # 3:00 PM IST = 9:30 AM UTC
    - cron: "30 9 * * *"
    # 6:00 PM IST = 12:30 PM UTC
    - cron: "30 12 * * *"
    # 9:00 PM IST = 3:30 PM UTC
    - cron: "30 15 * * *"

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Run Job Scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python job_scraper.py
